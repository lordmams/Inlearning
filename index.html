
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperçu des formulaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .preview-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .preview-title {
            text-align: center;
            margin-bottom: 30px;
            color: #0d6efd;
        }
        .preview-link {
            display: block;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            text-decoration: none;
            color: #0d6efd;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
        }
        .preview-link:hover {
            background-color: #e9ecef;
            transform: translateY(-2px);
        }
        body {
            background-color: #f0f2f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="preview-container">
            <h2 class="preview-title">Aperçu des formulaires</h2>
            <a href="login.html" class="preview-link">Formulaire de connexion</a>
            <a href="register.html" class="preview-link">Formulaire d'inscription</a>
            <a href="profile_form.html" class="preview-link">Formulaire de profil utilisateur</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
